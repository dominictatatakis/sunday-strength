services:
  - type: web
    name: sunday-strength
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/fetch_exercise_media.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        sync: false          # paste the Supabase connection string
      - key: RESEND_API_KEY
        sync: false          # paste from resend.com -> API Keys
      - key: EMAIL_FROM
        value: Sunday Strength <onboarding@resend.dev>
      # Beta option: Gmail SMTP sends from your own address to anyone
      # (~500/day). Takes priority over Resend when both are set.
      - key: GMAIL_USER
        sync: false          # e.g. you@gmail.com (blank = use Resend)
      - key: GMAIL_APP_PASSWORD
        sync: false          # Google Account -> Security -> App passwords
