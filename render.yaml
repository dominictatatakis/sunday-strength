services:
  - type: web
    name: sunday-strength
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/fetch_exercise_media.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        sync: false          # paste the Supabase connection string
      - key: RESEND_API_KEY
        sync: false          # paste from resend.com -> API Keys
      - key: EMAIL_FROM
        value: Sunday Strength <onboarding@resend.dev>
      # Beta email route (Render free tier blocks SMTP, so use Brevo's HTTPS
      # API): brevo.com free account, verify your address as a sender, then:
      - key: BREVO_API_KEY
        sync: false          # Brevo -> SMTP & API -> API keys
      - key: BREVO_SENDER
        sync: false          # the verified sender address
      # Gmail SMTP alternative — only works on hosts that allow SMTP egress.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
